<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Stream Deck</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/static/icon.svg" />
  <link rel="apple-touch-icon" href="/static/icon.svg" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <div class="brand">Stream Deck</div>
    <nav id="tabs" class="tabs"></nav>
    <div class="status">
      <span id="conn-dot" class="dot dot-off"></span>
      <span id="conn-text">conectando…</span>
    </div>
    <button id="obs-btn" class="icon-btn hidden" title="Ajustes OBS">OBS</button>
    <button id="tmpl-btn" class="icon-btn hidden" title="Plantillas">📋</button>
    <button id="edit-btn" class="icon-btn" title="Editar">✎</button>
  </header>

  <main id="grid" class="grid"></main>

  <div id="toast" class="toast" hidden></div>

  <!-- Diálogo: editar botón -->
  <dialog id="edit-dialog" class="edit-dialog">
    <form method="dialog">
      <h2>Editar botón</h2>

      <label>Etiqueta
        <input id="ed-label" type="text" maxlength="32" />
      </label>

      <label>Color
        <input id="ed-color" type="color" />
      </label>

      <label>Acción
        <select id="ed-action-type">
          <option value="">— sin acción —</option>
          <option value="soundpad_play">Soundpad: reproducir sonido</option>
          <option value="soundpad_stop">Soundpad: parar</option>
          <option value="soundpad_next">Soundpad: siguiente</option>
          <option value="soundpad_previous">Soundpad: anterior</option>
          <option value="hotkey">Atajo de teclado</option>
          <option value="launch_app">Lanzar aplicación</option>
          <option value="run_script">Ejecutar script</option>
          <option value="open_url">Abrir URL</option>
          <option value="text_input">Escribir texto</option>
          <option value="delay">Pausa (ms)</option>
          <option value="sequence">Secuencia (JSON)</option>
          <option value="obs_scene">OBS: cambiar escena</option>
          <option value="obs_toggle_stream">OBS: toggle stream</option>
          <option value="obs_toggle_record">OBS: toggle grabación</option>
          <option value="obs_toggle_mute">OBS: toggle mute fuente</option>
          <option value="obs_transition">OBS: transición</option>
        </select>
      </label>

      <label>Icono (emoji, opcional)
        <input id="ed-icon" type="text" maxlength="4" placeholder="ej: 🎤" />
      </label>

      <div id="ed-params"></div>

      <menu>
        <button id="ed-delete" value="delete" class="danger">Vaciar</button>
        <button id="ed-cancel" value="cancel">Cancelar</button>
        <button id="ed-save" value="save" class="primary">Guardar</button>
      </menu>
    </form>
  </dialog>

  <!-- Diálogo: gestión de páginas -->
  <dialog id="page-dialog" class="edit-dialog">
    <form method="dialog">
      <h2 id="pg-title">Página</h2>

      <label>Nombre
        <input id="pg-name" type="text" maxlength="24" />
      </label>

      <menu>
        <button id="pg-delete" value="delete" class="danger">Borrar página</button>
        <button id="pg-cancel" value="cancel">Cancelar</button>
        <button id="pg-save" value="save" class="primary">Guardar</button>
      </menu>
    </form>
  </dialog>

  <!-- Diálogo: ajustes OBS -->
  <dialog id="obs-dialog" class="edit-dialog">
    <form method="dialog">
      <h2>OBS WebSocket</h2>
      <p class="muted">
        En OBS Studio: Tools → WebSocket Server Settings → Enable.
        Anota el puerto y la contraseña que aparecen.
      </p>

      <label>Host
        <input id="obs-host" type="text" value="localhost" />
      </label>

      <label>Puerto
        <input id="obs-port" type="number" value="4455" min="1" max="65535" />
      </label>

      <label>Contraseña
        <input id="obs-password" type="text" placeholder="(en blanco si no hay)" />
      </label>

      <p id="obs-state" class="muted">Estado: desconocido</p>

      <menu>
        <button id="obs-cancel" value="cancel">Cerrar</button>
        <button id="obs-save" value="save" class="primary">Conectar</button>
      </menu>
    </form>
  </dialog>

  <!-- Diálogo: selector de plantillas -->
  <dialog id="tmpl-dialog" class="edit-dialog tmpl-dialog">
    <form method="dialog">
      <h2>Plantillas</h2>
      <p class="muted">Aplica una plantilla como página nueva.</p>
      <div id="tmpl-list" class="tmpl-list"></div>
      <menu>
        <button id="tmpl-cancel" value="cancel">Cerrar</button>
      </menu>
    </form>
  </dialog>

  <script src="/static/app.js"></script>
</body>
</html>
